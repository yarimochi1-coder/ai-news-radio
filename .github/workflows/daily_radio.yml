name: AIニュースラジオ 毎朝自動生成

on:
  schedule:
    # 毎朝 7:00 JST（= 22:00 UTC 前日）に実行
    - cron: "0 22 * * *"
  workflow_dispatch: # 手動実行も可能

permissions:
  contents: write
  pages: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: パッケージインストール
        run: pip install -r requirements.txt

      - name: ラジオ生成
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_radio.py

      # 音声をASCIIファイル名でdocs/にコピー（GitHub Pages用）
      - name: GitHub Pages用に音声をコピー
        run: |
          mkdir -p docs/audio
          TODAY=$(date +%Y-%m-%d)
          if [ -f "音声/${TODAY}_AIニュースラジオ.mp3" ]; then
            cp "音声/${TODAY}_AIニュースラジオ.mp3" "docs/audio/${TODAY}.mp3"
          fi

      - name: 生成ファイルをコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "🎙 AIニュースラジオ $(date +%Y-%m-%d) 生成"
          git push

      # GitHub Pagesのデプロイを待つ
      - name: GitHub Pages デプロイ待ち
        run: sleep 30

      # LINE送信
      - name: LINE送信
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          REPO_OWNER=$(echo $GITHUB_REPOSITORY | cut -d'/' -f1)
          REPO_NAME=$(echo $GITHUB_REPOSITORY | cut -d'/' -f2)
          TODAY=$(date +%Y-%m-%d)
          AUDIO_FILE="docs/audio/${TODAY}.mp3"

          if [ -f "$AUDIO_FILE" ]; then
            SIZE=$(stat -c%s "$AUDIO_FILE")
            DURATION=$(( SIZE * 8 / 32000 * 1000 ))
            AUDIO_URL="https://${REPO_OWNER}.github.io/${REPO_NAME}/audio/${TODAY}.mp3"

            # 音声URLが有効か確認（リトライ付き）
            for i in 1 2 3; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$AUDIO_URL")
              if [ "$STATUS" = "200" ]; then
                echo "音声URL確認OK: $AUDIO_URL"
                break
              fi
              echo "Pages未デプロイ (${STATUS})、30秒待機... (${i}/3)"
              sleep 30
            done

            # 音声メッセージ送信
            RESULT=$(curl -s -X POST https://api.line.me/v2/bot/message/push \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${LINE_CHANNEL_TOKEN}" \
              -d "{
                \"to\": \"${LINE_USER_ID}\",
                \"messages\": [
                  {
                    \"type\": \"text\",
                    \"text\": \"🎙 AIニュースラジオ ${TODAY}\n\n音声を生成しました！下の再生ボタンを押してください。\"
                  },
                  {
                    \"type\": \"audio\",
                    \"originalContentUrl\": \"${AUDIO_URL}\",
                    \"duration\": ${DURATION}
                  }
                ]
              }")
            echo "LINE送信結果: $RESULT"

            # 音声送信が失敗した場合、テキストだけ送信
            if echo "$RESULT" | grep -q "error\|Failed"; then
              echo "音声送信失敗、テキストのみ再送..."
              curl -s -X POST https://api.line.me/v2/bot/message/push \
                -H "Content-Type: application/json" \
                -H "Authorization: Bearer ${LINE_CHANNEL_TOKEN}" \
                -d "{
                  \"to\": \"${LINE_USER_ID}\",
                  \"messages\": [
                    {
                      \"type\": \"text\",
                      \"text\": \"🎙 AIニュースラジオ ${TODAY}\n\n音声を生成しました！\n🎧 こちらから聴けます:\n${AUDIO_URL}\"
                    }
                  ]
                }"
            fi
          fi
