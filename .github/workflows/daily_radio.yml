name: AIニュースラジオ 毎朝自動生成

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: 休日チェック
        id: rest_check
        run: |
          TODAY=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          if python3 -c "import json; days=json.load(open('rest_days.json'))['rest_days']; exit(0 if '${TODAY}' in days else 1)" 2>/dev/null; then
            echo "今日 (${TODAY}) は休有持 — スキップします"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Python セットアップ
        if: steps.rest_check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: パッケージインストール
        if: steps.rest_check.outputs.skip != 'true'
        run: pip install -r requirements.txt

      - name: ラジオ生成
        if: steps.rest_check.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_radio.py

      - name: GitHub Pages用に音声をコピー
        if: steps.rest_check.outputs.skip != 'true'
        run: |
          mkdir -p docs/audio
          TODAY=$(date +%Y-%m-%d)
          if [ -f "音声/${TODAY}_AIニュースラジオ.mp3" ]; then
            cp "音声/${TODAY}_AIニュースラジオ.mp3" "docs/audio/${TODAY}.mp3"
          fi

      - name: 生成ファイルをコミット
        if: steps.rest_check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "🎙 AIニュースラジオ $(date +%Y-%m-%d) 生成"
          git push

      - name: GitHub Pages デプロイ待ち
        if: steps.rest_check.outputs.skip != 'true'
        run: sleep 30

      - name: LINE送信
        if: steps.rest_check.outputs.skip != 'true'
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          REPO_OWNER=$(echo $GITHUB_REPOSITORY | cut -d'/' -f1)
          REPO_NAME=$(echo $GITHUB_REPOSITORY | cut -d'/' -f2)
          TODAY=$(date +%Y-%m-%d)
          AUDIO_FILE="docs/audio/${TODAY}.mp3"

          if [ -f "$AUDIO_FILE" ]; then
            SIZE=$(stat -c%s "$AUDIO_FILE")
            DURATION=$(( SIZE * 8 / 32000 * 1000 ))
            AUDIO_URL="https://${REPO_OWNER}.github.io/${REPO_NAME}/audio/${TODAY}.mp3"

            for i in 1 2 3; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$AUDIO_URL")
              if [ "$STATUS" = "200" ]; then
                echo "音声URL確認OK"
                break
              fi
              echo "Pages未デプロイ、30秒待機... (${i}/3)"
              sleep 30
            done

            RESULT=$(curl -s -X POST https://api.line.me/v2/bot/message/push \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${LINE_CHANNEL_TOKEN}" \
              -d "{
                \"to\": \"${LINE_USER_ID}\",
                \"messages\": [
                  {
                    \"type\": \"text\",
                    \"text\": \"🎙 AIニュースラジオ ${TODAY}\n\n▶ 下の音声を再生してください\"
                  },
                  {
                    \"type\": \"audio\",
                    \"originalContentUrl\": \"${AUDIO_URL}\",
                    \"duration\": ${DURATION}
                  }
                ]
              }")
            echo "LINE送信結果: $RESULT"

            if echo "$RESULT" | grep -q "error\|Failed"; then
              curl -s -X POST https://api.line.me/v2/bot/message/push \
                -H "Content-Type: application/json" \
                -H "Authorization: Bearer ${LINE_CHANNEL_TOKEN}" \
                -d "{
                  \"to\": \"${LINE_USER_ID}\",
                  \"messages\": [
                    {
                      \"type\": \"text\",
                      \"text\": \"🎙 AIニュースラジオ ${TODAY}\n\n🎧 こちらから聴けます:\n${AUDIO_URL}\"
                    }
                  ]
                }"
            fi
          fi
